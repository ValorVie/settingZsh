# custom private repo sample
#
# This file is intentionally private-scoped. Do not put public baseline SSH
# settings here; keep only per-user or per-environment private host entries.

Host github-work
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_work
  IdentitiesOnly yes

Host corp-bastion
  HostName bastion.example.internal
  User devops
  IdentityFile ~/.ssh/id_ed25519_work
  IdentitiesOnly yes
